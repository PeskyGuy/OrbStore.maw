        .nav { max-width:780px; margin:0 auto; display:flex; gap:0; padding:0 10px; }
        .nav a { color:#99bbdd; text-decoration:none; font-size:11px; padding:6px 14px; display:block; border-right:1px solid #2a4d6e; }

        .nav a:hover, .nav a.active { background:#2a4d6e; color:#fff; }

        .container { max-width:780px; margin:0 auto; padding:12px 10px; }

        .forum-section { background:#fff; border:1px solid #999; margin-bottom:15px; }
        .section-header { background:linear-gradient(to bottom, #f5f0e8, #e8e0d0); padding:6px 10px; border-bottom:1px solid #999; display:flex; justify-content:space-between; align-items:center; }
        .section-title { color:#2a4d6e; font-size:12px; font-weight:bold; text-transform:uppercase; }

        .refresh-btn { background:linear-gradient(to bottom, #447799, #2a4d6e); border:1px solid #1a3050; color:#fff; padding:4px 12px; font-size:10px; cursor:pointer; font-weight:bold; }
        .refresh-btn:hover { background:#2a4d6e; }

        .thread-list { padding:0; }
        .thread { display:flex; gap:12px; padding:10px; border-bottom:1px solid #eee; transition:background 0.2s; }
        .thread:hover { background:#f9f5f0; }
        .thread:last-child { border-bottom:none; }

        .thread-icon { width:36px; height:36px; background:#fff; border:1px solid #ccc; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
        .thread-content { flex:1; }
        .thread-title { color:#0066cc; font-size:13px; font-weight:bold; margin-bottom:3px; cursor:pointer; }
        .thread-title:hover { text-decoration:underline; }
        .thread-meta { font-size:10px; color:#666; }
        .thread-author { color:#333; font-weight:bold; }
        .thread-stats { display:flex; gap:12px; align-items:center; font-size:11px; color:#666; }
        .stat { display:flex; flex-direction:column; align-items:center; min-width:45px; }
        .stat-number { color:#cc0000; font-weight:bold; }

        .footer { background:#2a4d6e; color:#99bbdd; text-align:center; padding:15px; font-size:10px; border-top:3px solid #1a3050; margin-top:30px; }
        .footer a { color:#aaccee; }

        .hot-badge { background:#cc3300; color:#fff; padding:1px 4px; font-size:9px; margin-left:5px; font-weight:bold; }
        .new-badge { background:#006600; color:#fff; padding:1px 4px; font-size:9px; margin-left:5px; font-weight:bold; }
    </style>

        const threadData = {

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function generateThreadHTML(thread) {
            const badges = [];
            if (thread.hot) badges.push('<span class="hot-badge">HOT</span>');
            if (thread.new) badges.push('<span class="new-badge">NEW</span>');

            const titleElement = thread.secret 
                ? `<a href="secret-forum.html" class="thread-title" style="text-decoration: none;">${thread.title}${badges.join('')}</a>`
                : `<div class="thread-title">${thread.title}${badges.join('')}</div>`;

            return `
                <div class="thread">
                    <div class="thread-icon">${thread.icon}</div>
                    <div class="thread-content">
                        ${titleElement}
                        <div class="thread-meta">
                            Started by <span class="thread-author">${thread.author}</span> • 
                            ${Math.floor(Math.random() * 24) + 1}h ago
                        </div>
                    </div>
                    <div class="thread-stats">
                        <div class="stat">
                            <span class="stat-number">${thread.replies}</span>
                            <span>Replies</span>
                        </div>
                        <div class="stat">
                            <span class="stat-number">${thread.views}</span>
                            <span>Views</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function refreshThreads(category) {
            const container = document.getElementById(`${category}-threads`);
            const shuffled = shuffleArray(threadData[category]);
            let selected = shuffled.slice(0, 5);
            
            // 15% chance to add the secret thread to general category
            if (category === 'general' && Math.random() < 0.15) {
                const secretThread = {
                    title: "Has anyone found the hidden easter egg in Riftwalker Chronicles?",
                    author: "ElijahTheSeeker",
                    icon: "🔍",
                    replies: 0,
                    views: 3,
                    secret: true
                };
                selected = [secretThread, ...selected.slice(0, 4)];
            }
            
            container.style.opacity = '0.5';
            
            setTimeout(() => {
                container.innerHTML = selected.map(thread => generateThreadHTML(thread)).join('');
                container.style.opacity = '1';
            }, 300);
        }

        function refreshAllThreads() {
            refreshThreads('general');
            refreshThreads('tech');
            refreshThreads('competitive');
        }

        // Initialize all sections
        refreshAllThreads();
    </script>
